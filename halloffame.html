<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hall of Fame — LMATFY.fyi</title>
  <meta name="description" content="The greatest questions people couldn't be bothered to ask AI themselves." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%237F77DD'/><text y='78' x='50' text-anchor='middle' font-size='72' font-family='Georgia,serif' font-weight='bold' fill='white'>A</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f7f7f9;
      --border: #e0e0e8;
      --accent: #7F77DD;
      --accent-dim: #534AB7;
      --accent-light: #EEEDFE;
      --text: #111118;
      --muted: #888796;
      --mono: 'DM Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--display);
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 2rem 0;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .wordmark {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      color: var(--text);
      text-decoration: none;
    }

    .wordmark .accent { color: var(--accent); }

    .tagline-small {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 3rem 1.5rem 2rem;
    }

    .trophy {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero p {
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── LEADERBOARD ── */
    .leaderboard {
      max-width: 620px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
      width: 100%;
      flex: 1;
    }

    .loading {
      text-align: center;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
      padding: 3rem 0;
    }

    .empty {
      text-align: center;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
      padding: 3rem 0;
      line-height: 1.8;
    }

    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: var(--accent); }

    .rank {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      color: var(--accent);
      min-width: 2rem;
      text-align: center;
      flex-shrink: 0;
    }

    .rank.gold   { color: #F5A623; }
    .rank.silver { color: #9B9B9B; }
    .rank.bronze { color: #C47B3A; }

    .question-text {
      flex: 1;
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--text);
      line-height: 1.5;
    }

    .upvote-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .upvote-btn:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .upvote-btn.voted {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .upvote-arrow {
      font-size: 1rem;
      color: var(--accent);
      line-height: 1;
    }

    .upvote-count {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      line-height: 1;
    }

    /* ── BACK LINK ── */
    .back {
      text-align: center;
      padding: 1rem;
    }

    .back a {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.05em;
    }

    .back a:hover { text-decoration: underline; }

    /* ── FOOTER ── */
    footer {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    footer span {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    @media (max-width: 500px) {
      header { padding: 1.2rem 1.2rem 0; }
      .leaderboard { padding: 0 1rem; }
      .card { padding: 1rem; gap: 1rem; }
    }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-75HPFYNRFN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-75HPFYNRFN');
  </script>
</head>
<body>
<div id="app">
  <header>
    <a href="/" class="wordmark">LM<span class="accent">A</span>TFY.fyi</a>
    <div class="tagline-small">Let Me Ask That For You</div>
  </header>

  <div class="hero">
    <div class="trophy">🏆</div>
    <h1>Hall of <em>Fame</em></h1>
    <p>The greatest questions people couldn't be bothered to ask AI themselves.</p>
  </div>

  <div class="leaderboard" id="leaderboard">
    <div class="loading">Loading...</div>
  </div>

  <div class="back">
    <a href="/">← Generate your own link</a>
  </div>

  <footer>
    <span>© 2026 LMATFY.fyi</span>
    <span>The passive-aggressive AI link generator</span>
  </footer>
</div>

<script>
  const SUPABASE_URL = 'https://wfewxvneijnxjmloasuy.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_8Qd3IMK1FeVR1teBURYuyQ_p8TUSgJx';

  const rankLabels = ['🥇', '🥈', '🥉'];
  const rankClasses = ['gold', 'silver', 'bronze'];

  // Track voted IDs in session
  const voted = new Set();

  async function loadHallOfFame() {
    const el = document.getElementById('leaderboard');
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/questions?approved=eq.true&order=upvotes.desc&limit=3`,
        {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        }
      );
      const data = await res.json();

      if (!data || data.length === 0) {
        el.innerHTML = '<div class="empty">No questions yet.<br>Be the first to generate one!</div>';
        return;
      }

      el.innerHTML = data.map((q, i) => `
        <div class="card" id="card-${q.id}">
          <div class="rank ${rankClasses[i]}">${rankLabels[i]}</div>
          <div class="question-text">${escapeHtml(q.question)}</div>
          <button class="upvote-btn" onclick="upvote('${q.id}')" id="btn-${q.id}" title="Upvote">
            <span class="upvote-arrow">▲</span>
            <span class="upvote-count" id="count-${q.id}">${q.upvotes || 0}</span>
          </button>
        </div>
      `).join('');

    } catch (err) {
      el.innerHTML = '<div class="empty">Couldn\'t load questions right now.<br>Try again in a moment.</div>';
    }
  }

  async function upvote(id) {
    if (voted.has(id)) return;
    voted.add(id);

    const btn = document.getElementById(`btn-${id}`);
    const countEl = document.getElementById(`count-${id}`);
    btn.classList.add('voted');

    try {
      // Get current upvotes
      const getRes = await fetch(
        `${SUPABASE_URL}/rest/v1/questions?id=eq.${id}&select=upvotes`,
        {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        }
      );
      const rows = await getRes.json();
      const newCount = ((rows[0] && rows[0].upvotes) || 0) + 1;

      // Update upvotes
      await fetch(
        `${SUPABASE_URL}/rest/v1/questions?id=eq.${id}`,
        {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ upvotes: newCount })
        }
      );
      countEl.textContent = newCount;
    } catch (err) {
      // silent fail
      voted.delete(id);
      btn.classList.remove('voted');
    }
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  loadHallOfFame();
</script>
</body>
</html>
